# Argo CD UI за Traefik forward-auth (role=admin) - тем же гейтом, что Grafana/Adminer.
# Свой логин Argo выключается (server.disable.auth), TLS терминирует Traefik (server.insecure),
# UI под субпутём /argocd (server.rootpath). Команды-предусловия - в deploy/k3s-setup.md (раздел Argo UI):
#   kubectl -n argocd patch cm argocd-cmd-params-cm --type merge \
#     -p '{"data":{"server.insecure":"true","server.rootpath":"/argocd","server.disable.auth":"true"}}'
#   kubectl -n argocd rollout restart deploy/argocd-server
#   kubectl apply -f deploy/gitops/argocd-ingress.yaml
#
# Хост staging.codelens.fun - тот же, где admin-сессия и refresh-кука (host-only), чтобы forward-auth
# её увидел. Argo управляет и staging, и prod; гейтит staging-admin.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: argocd-forward-auth
  namespace: argocd
spec:
  forwardAuth:
    address: http://codelens-backend.codelens-staging.svc.cluster.local:8080/auth/forward-auth
    authResponseHeaders:
      - X-Auth-User
      - X-Auth-Role
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: argocd-argocd-forward-auth@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: staging.codelens.fun
      http:
        paths:
          - path: /argocd
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port: { number: 80 }
  tls:
    - hosts:
        - staging.codelens.fun
      secretName: argocd-tls
