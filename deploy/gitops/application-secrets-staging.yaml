# Argo CD Application - секреты staging. Синкает папку с зашифрованными SealedSecret
# (Argo применяет не только Helm-чарт, но и каталог обычных манифестов).
# Контроллер sealed-secrets в кластере расшифровывает SealedSecret в обычный Secret/codelens-secrets,
# который читают поды основного приложения (envFrom).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: codelens-secrets-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: codelens
  source:
    repoURL: https://github.com/dryslo/Codelens.git
    targetRevision: dev
    path: deploy/gitops/sealed/staging               # зашифрованные манифесты этого окружения
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: codelens-staging
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
