# Argo CD Application - секреты prod. См. application-secrets-staging.yaml.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: codelens-secrets-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: codelens
  source:
    repoURL: https://github.com/dryslo/Codelens.git
    targetRevision: main
    path: deploy/gitops/sealed/prod
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: codelens-prod
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
