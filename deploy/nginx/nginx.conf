# Single-origin reverse-proxy для forward-auth: приложение + панели под одним доменом, чтобы
# refresh-кука (path=/) уходила и к /grafana. Доступ к панелям решает /auth/forward-auth.
events {}

http {
  map $http_upgrade $connection_upgrade { default upgrade; '' close; }

  upstream frontend { server frontend:8501; }
  upstream backend  { server backend:8080; }
  upstream grafana  { server grafana:3000; }

  server {
    listen 80;

    # auth_request: проверка admin-сессии по refresh-куке (внутренний, тело не нужно).
    location = /auth_check {
      internal;
      proxy_pass http://backend/auth/forward-auth;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header Cookie $http_cookie;
    }
    location @login { return 302 /; }     # нет admin-сессии -> на логин приложения

    # Grafana за forward-auth (serve_from_sub_path -> префикс /grafana сохраняем).
    location = /grafana { return 302 /grafana/; }
    location /grafana/ {
      auth_request /auth_check;
      error_page 401 403 = @login;
      # Логин/роль из ответа forward-auth -> в запрос к Grafana (auth.proxy опознаёт пользователя).
      auth_request_set $auth_user $upstream_http_x_auth_user;
      auth_request_set $auth_role $upstream_http_x_auth_role;
      proxy_set_header X-Auth-User $auth_user;
      proxy_set_header X-Auth-Role $auth_role;
      proxy_pass http://grafana;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API backend - префикс /api снимаем (trailing slash в proxy_pass): /api/search -> backend/search.
    location /api/ {
      proxy_pass http://backend/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300;
    }

    # Приложение (Streamlit) - с upgrade-заголовками для websocket.
    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_read_timeout 86400;
    }
  }
}
