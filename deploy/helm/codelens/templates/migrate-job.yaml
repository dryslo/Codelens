{{- $full := include "codelens.fullname" . -}}
# alembic upgrade head на primary (-pg-rw). Helm-hook: до install/upgrade, перед запуском подов.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $full }}-migrate
  labels:
    {{- include "codelens.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "codelens.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: {{ include "codelens.image" (dict "root" . "name" "backend") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: {{ include "codelens.secretName" . }}
