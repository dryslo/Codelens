{{- $full := include "codelens.fullname" . -}}
# alembic upgrade head на primary (-pg-rw).
# В Argo это Sync-hook (НЕ pre-install): запускается ВНУТРИ синка после создания CNPG Cluster
# (sync-wave -2) и до app-подов (wave 0). initContainer ждёт готовность БД, поэтому не зависит от
# того, умеет ли Argo health-check CNPG. pre-install hook здесь приводил к дедлоку: он шёл до
# создания Cluster в основном синке, падал на отсутствии БД и блокировал весь синк.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $full }}-migrate
  labels:
    {{- include "codelens.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "codelens.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      initContainers:
        # Ждём, пока CNPG поднимет primary и сервис -pg-rw начнёт принимать соединения.
        - name: wait-postgres
          image: {{ include "codelens.image" (dict "root" . "name" "backend") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              until python -c 'import socket; socket.create_connection(("{{ $full }}-pg-rw", 5432), 3)' 2>/dev/null; do
                echo "ждём {{ $full }}-pg-rw:5432 ..."; sleep 3
              done
      containers:
        - name: migrate
          image: {{ include "codelens.image" (dict "root" . "name" "backend") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: {{ include "codelens.secretName" . }}
