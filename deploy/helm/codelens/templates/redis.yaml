{{- if .Values.redis.enabled -}}
{{- $full := include "codelens.fullname" . -}}
# Обычный Redis (не шардированный): кэш + сессии. Один под, PVC для персистентности.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $full }}-redis
  labels:
    {{- include "codelens.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  serviceName: {{ $full }}-redis
  replicas: 1
  selector:
    matchLabels:
      {{- include "codelens.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "codelens.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      {{- with .Values.redis.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          args: ["--appendonly", "yes"]
          ports:
            - { name: redis, containerPort: 6379 }
          readinessProbe:
            tcpSocket: { port: 6379 }
            initialDelaySeconds: 5
          volumeMounts:
            - { name: data, mountPath: /data }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.redis.storageClass }}
        storageClassName: {{ .Values.redis.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $full }}-redis
  labels:
    {{- include "codelens.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  selector:
    {{- include "codelens.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
  ports:
    - { port: 6379, targetPort: 6379 }
{{- end }}
