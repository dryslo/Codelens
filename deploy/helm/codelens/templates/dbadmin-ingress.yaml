{{- if and .Values.dbadmin.enabled .Values.ingress.enabled -}}
{{- $full := include "codelens.fullname" . -}}
{{- $ns := .Release.Namespace -}}
{{- $authUrl := printf "http://%s-backend.%s.svc.cluster.local:%v/auth/forward-auth" $full $ns .Values.backend.port -}}
# Гейт админ-панели Adminer: forward-auth (role=admin в БД) на том же host, что приложение
# (refresh-кука path=/ host-only). Две реализации по ingress.className: traefik (overlay k3s) и nginx.
# Adminer работает по относительным URL, поэтому хватает stripPrefix - без X-Script-Name/headers.
# ВАЖНО: forwardAuth.address - FQDN сервиса backend. Traefik живёт в kube-system и короткое имя
# (codelens-backend) резолвил бы в своём namespace -> "no such host".
{{- if eq .Values.ingress.className "traefik" }}
# ---------- Traefik ----------
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ $full }}-forward-auth
  labels:
    {{- include "codelens.labels" . | nindent 4 }}
spec:
  forwardAuth:
    address: {{ $authUrl | quote }}
    authResponseHeaders:
      - X-Auth-User
      - X-Auth-Role
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ $full }}-adminer-strip
  labels:
    {{- include "codelens.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - /adminer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $full }}-adminer
  labels:
    {{- include "codelens.labels" . | nindent 4 }}
    app.kubernetes.io/component: adminer
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: "{{ $ns }}-{{ $full }}-forward-auth@kubernetescrd,{{ $ns }}-{{ $full }}-adminer-strip@kubernetescrd"
spec:
  ingressClassName: traefik
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /adminer
            pathType: Prefix
            backend:
              service:
                name: {{ $full }}-adminer
                port: { number: 80 }
{{- else }}
# ---------- ingress-nginx ----------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $full }}-adminer
  labels:
    {{- include "codelens.labels" . | nindent 4 }}
    app.kubernetes.io/component: adminer
  annotations:
    nginx.ingress.kubernetes.io/auth-url: {{ $authUrl | quote }}
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-User,X-Auth-Role"
    nginx.ingress.kubernetes.io/auth-signin: {{ printf "https://%s/" .Values.ingress.host | quote }}
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /adminer(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $full }}-adminer
                port: { number: 80 }
{{- end }}
{{- end }}
