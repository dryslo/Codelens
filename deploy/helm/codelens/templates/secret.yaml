{{- if .Values.secrets.create -}}
{{- $full := include "codelens.fullname" . -}}
{{- $dsn := .Values.secrets.databaseDsn -}}
{{- if and (not $dsn) .Values.postgres.enabled -}}
{{- $dsn = printf "postgresql+psycopg://%s:%s@%s-pg-rw:5432/%s" .Values.postgres.user .Values.postgres.password $full .Values.postgres.database -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "codelens.secretName" . }}
  labels:
    {{- include "codelens.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Имена должны совпадать с ${VAR} в config.yaml и api_key_env провайдеров.
  DATABASE_DSN: {{ $dsn | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  GROQ_API_KEY: {{ .Values.secrets.groqApiKey | quote }}
  GEMINI_API_KEY: {{ .Values.secrets.geminiApiKey | quote }}
  ADMIN_LOGIN: {{ .Values.secrets.adminLogin | quote }}
  ADMIN_PASSWORD: {{ .Values.secrets.adminPassword | quote }}
  HF_TOKEN: {{ .Values.secrets.hfToken | quote }}
  PGADMIN_DEFAULT_EMAIL: {{ .Values.secrets.pgadminEmail | quote }}
  PGADMIN_DEFAULT_PASSWORD: {{ .Values.secrets.pgadminPassword | quote }}
{{- end }}
