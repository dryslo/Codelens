# Overlay STAGING (ветка dev). Накладывается поверх values.yaml средствами Argo CD
# (helm.valueFiles: [values.yaml, values-staging.yaml]).
#
# image.tag правит CI (job bump-tag) после сборки образов, вручную не редактируется.
fullnameOverride: codelens     # стабильные имена ресурсов (codelens-*, codelens-pg-rw) вне зависимости
                               # от имени Argo Application

image:
  tag: latest                  # перезаписывается CI на git-SHA

# Одна нода Qdrant на staging -> фактор репликации/шарды коллекции тоже 1 (иначе не разместятся).
config:
  vector:
    shards: 1
    replicas: 1

ingress:
  host: staging.codelens.local

# Урезанный масштаб для staging-кластера.
frontend: { replicas: 1, hpa: { enabled: false } }
backend:  { replicas: 1, hpa: { enabled: false } }
embedder: { replicas: 1, hpa: { enabled: false } }
llm:      { replicas: 1, hpa: { enabled: false } }
qdrant:   { replicas: 1 }
postgres: { instances: 1 }
worker:   { replicas: 1 }

# Секрет codelens-secrets чарт не создаёт - его в namespace codelens-staging кладёт контроллер
# sealed-secrets из зашифрованного deploy/gitops/sealed/staging/codelens-secrets.yaml (он в git).
# Генерация: deploy/gitops/sealed/seal.sh staging. Подробно - deploy/gitops/sealed/README.md.
secrets:
  create: false
