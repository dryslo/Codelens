# Overlay STAGING (ветка dev). Накладывается поверх values.yaml средствами Argo CD
# (helm.valueFiles: [values.yaml, values-staging.yaml]).
#
# image.tag правит CI (job bump-tag) после сборки образов, вручную не редактируется.
#
# Раскладка: весь staging-стек сидит на одном выделенном узле node-dev (второй мощный сервер,
# 8 ГБ), а llm - на том же KZ-узле, что и prod-llm (только оттуда доступны внешние Groq/Gemini).
# Так prod-овские data-узлы (6 ГБ) не задеваются. Узел размечается:
#   kubectl label node node-dev codelens.io/env=staging
#   kubectl taint node node-dev dedicated=staging:NoSchedule    # чужие поды сюда нельзя
# nodeSelector притягивает staging-поды на node-dev, toleration снимает действие taint'а.
# staging НЕ подключает values-k3s.yaml, поэтому ingress/раскладку задаём прямо здесь.
fullnameOverride: codelens # стабильные имена ресурсов (codelens-*, codelens-pg-rw) вне зависимости
# от имени Argo Application
image:
  tag: 781e87ebd3d6666c8bf3edccbda96bca843f6e0a # перезаписывается CI на git-SHA
# Одна нода Qdrant на staging -> фактор репликации/шарды коллекции тоже 1 (иначе не разместятся).
config:
  vector:
    shards: 1
    replicas: 1
  oidc:
    google:
      clientId: "657334521650-f06agmbiql4mj5adn1u5ffr3lolvk1pq.apps.googleusercontent.com"
  # Дашборды в Админке: subpath того же хоста (staging.codelens.fun) за forward-auth.
  # Adminer - со слешем: его сессионная кука scoped на path=/adminer/, без слеша браузер сидит на
  # /adminer?... и кука не уходит - логин зацикливается на форме.
  panels:
    Grafana: /grafana
    Adminer: /adminer/
    Argo CD: /argocd
ingress:
  className: traefik # тот же k3s, что и prod (по умолчанию traefik); база ставит nginx
  host: staging.codelens.fun
  authPath: true # /auth/* -> backend (нужно для callback Google OIDC)
  tls: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod # тот же issuer, что и prod
# Урезанный масштаб (всё в одну реплику) + прибивка к node-dev. embedder с лимитом 4Gi:
# e5-large + qdrant/pg/stateless должны уместиться в 8 ГБ узла.
frontend:
  replicas: 1
  hpa: {enabled: false}
  nodeSelector: {codelens.io/env: staging}
  tolerations:
    - {key: dedicated, operator: Equal, value: staging, effect: NoSchedule}
backend:
  replicas: 1
  hpa: {enabled: false}
  nodeSelector: {codelens.io/env: staging}
  tolerations:
    - {key: dedicated, operator: Equal, value: staging, effect: NoSchedule}
embedder:
  replicas: 1
  hpa: {enabled: false}
  resources:
    requests: {cpu: "1", memory: 2Gi}
    limits: {cpu: "2", memory: 4Gi}
  nodeSelector: {codelens.io/env: staging}
  tolerations:
    - {key: dedicated, operator: Equal, value: staging, effect: NoSchedule}
worker:
  replicas: 1
  nodeSelector: {codelens.io/env: staging}
  tolerations:
    - {key: dedicated, operator: Equal, value: staging, effect: NoSchedule}
qdrant:
  replicas: 1
  storage: 25Gi
  nodeSelector: {codelens.io/env: staging}
  tolerations:
    - {key: dedicated, operator: Equal, value: staging, effect: NoSchedule}
postgres:
  instances: 1
  storage: 10Gi
  nodeSelector: {codelens.io/env: staging}
  tolerations:
    - {key: dedicated, operator: Equal, value: staging, effect: NoSchedule}
redis:
  nodeSelector: {codelens.io/env: staging}
  tolerations:
    - {key: dedicated, operator: Equal, value: staging, effect: NoSchedule}
# llm -> единственный внешне-доступный узел (KZ), рядом с prod-llm. Свой Service в ns staging,
# config.yaml резолвит его внутри namespace; под физически едет на geo=eu по nodeSelector.
llm:
  replicas: 1
  hpa: {enabled: false}
  resources:
    requests: {cpu: "100m", memory: 128Mi}
    limits: {cpu: "500m", memory: 384Mi}
  nodeSelector: {geo: eu}
  tolerations:
    - {key: dedicated, operator: Equal, value: llm, effect: NoSchedule}
# Секрет codelens-secrets чарт не создаёт - его в namespace codelens-staging кладёт контроллер
# sealed-secrets из зашифрованного deploy/gitops/sealed/staging/codelens-secrets.yaml (он в git).
# Генерация: deploy/gitops/sealed/seal.sh staging. Подробно - deploy/gitops/sealed/README.md.
secrets:
  create: false
# БД-панель Adminer за forward-auth (role=admin) на staging.codelens.fun/adminer.
# qdrant=false: дашборд Qdrant под субпутём ломается (см. dbadmin-ingress), для демо не нужен.
# Своего логина у Adminer нет (desktop-режим), единственный гейт - forward-auth; секрет не нужен.
dbadmin:
  enabled: true
  qdrant: false
  nodeSelector: {codelens.io/env: staging}
  tolerations:
    - {key: dedicated, operator: Equal, value: staging, effect: NoSchedule}
# Наблюдаемость: рендерит ServiceMonitor (скрейп /metrics backend) + ConfigMap-дашборд Grafana.
# Их подхватывает kube-prometheus-stack (application-monitoring.yaml). serviceMonitor.labels пустые -
# стек настроен на serviceMonitorSelectorNilUsesHelmValues=false (берёт все ServiceMonitor).
monitoring:
  enabled: true
