name: CI/CD
on:
  pull_request: {}
  push:
    branches: [dev, main]

# contents:write - job bump-tag коммитит image.tag обратно в репо.
# packages:write - push образов в GHCR.
permissions:
  contents: write
  packages: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ hashFiles('pyproject.toml') }}
      - run: pip install -e ".[all,dev]"   # полный набор (как make install): тесты + eval-гейт
      - run: ruff check .
      - run: pytest -q
      - run: alembic upgrade head            # миграции на чистой sqlite
      # Гейт качества Precision@5: корпус data/codebase в репозитории, индекс собирается на месте.
      # Деплой не пройдёт, если precision ниже порога.
      - run: |
          python index.py data/codebase
          python evaluate.py --assert-min 0.60

  # Валидация Helm-чарта: рендер всех overlay'ев + kubeconform (схемы k8s + CRD CNPG).
  # Ловит ошибки манифестов до выката; CRD-схемы тянутся из datreeio/CRDs-catalog.
  helm-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz kubeconform && sudo mv kubeconform /usr/local/bin/
      - name: Lint + template + kubeconform
        run: |
          CHART=deploy/helm/codelens
          helm lint $CHART
          for v in values-local values-staging values-prod; do
            echo "== $v =="
            helm template $CHART -f $CHART/$v.yaml | kubeconform -strict -summary -ignore-missing-schemas \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
          done

  # Сборка и публикация образов в GHCR. Тег = git-SHA (иммутабельный, требуется для GitOps).
  # Только на dev: prod катит уже протестированный на staging образ (промоушн см. ниже), своих образов
  # main не собирает. Деплой-джобы спят, пока нет кластера: включаются repo-переменной DEPLOY_ENABLED=true
  # (GitHub → Settings → Secrets and variables → Actions → Variables). До этого push гоняет только
  # quality + helm-validate, образы в GHCR не публикуются.
  build-push:
    needs: [quality, helm-validate]   # деплой только если И тесты, И чарт валидны
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, backend, inference, llm, worker]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3   # docker-container драйвер: нужен для cache-to type=gha
      - name: Lowercase repo name           # GHCR требует lowercase в пути образа
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.${{ matrix.service }}
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.name }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Деплой выполняется не здесь: image.tag бампится в values-staging.yaml и коммитится, что
  # синхронизирует Argo CD. Только dev/staging: main защищён (push лишь через PR), поэтому prod-тег
  # ставится вручную в PR dev->main = тот же протестированный staging-образ (см. deploy/gitops/README.md).
  bump-tag:
    needs: build-push                 # build-push сам только на dev -> bump-tag тоже
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Bump image.tag to ${{ github.sha }}
        run: yq -i '.image.tag = "${{ github.sha }}"' deploy/helm/codelens/values-staging.yaml
      - name: Commit and push
        run: |
          git config user.name  "codelens-ci"
          git config user.email "ci@codelens.local"
          git add deploy/helm/codelens/values-staging.yaml
          # [skip ci] - чтобы этот коммит не запускал workflow повторно (бесконечный цикл).
          git commit -m "ci(staging): bump image.tag ${GITHUB_SHA::12} [skip ci]" \
            || { echo "image.tag не изменился - нечего коммитить"; exit 0; }
          git push
